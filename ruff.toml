target-version = "py311"
line-length = 88
extend-exclude = ["src/brepax/_version.py"]  # auto-generated by hatch-vcs

[lint]
select = [
    "F",     # pyflakes
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "ANN",   # flake8-annotations
    "B",     # flake8-bugbear
    "A",     # flake8-builtins
    "C4",    # flake8-comprehensions
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific
]
ignore = [
    "ANN401",  # dynamically typed Any
    "F722",    # jaxtyping uses string annotations that ruff cannot parse
]

[lint.per-file-ignores]
"tests/**/*.py" = ["ANN"]
"noxfile.py" = ["ANN"]
"src/brepax/_version.py" = ["ALL"]  # auto-generated by hatch-vcs

[lint.isort]
known-first-party = ["brepax"]
