name: Publish to PyPI

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v0.2.0)'
        required: true

permissions:
  id-token: write

jobs:
  publish:
    # Only publish stable releases (no pre-release tags like -rc, -beta).
    if: >-
      (github.event_name == 'push' && !contains(github.ref_name, '-'))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/brepax/
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
